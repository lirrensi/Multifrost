name: Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v5.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: multifrost-router-linux-x86_64
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: multifrost-router-linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: multifrost-router-macos-x86_64
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: multifrost-router-macos-aarch64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: multifrost-router-windows-x86_64.exe
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation linker (linux aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build router binary
        run: cargo build --release --bin multifrost-router --target ${{ matrix.target }}
        working-directory: router
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Prepare artifact
        shell: bash
        run: |
          cd router
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/multifrost-router.exe" "../${{ matrix.artifact }}"
          else
            cp "target/${{ matrix.target }}/release/multifrost-router" "../${{ matrix.artifact }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Flatten artifacts and generate checksums
        run: |
          mkdir -p dist
          find artifacts -type f -not -name '.DS_Store' | while read -r src; do
            fname="$(basename "$src")"
            cp "$src" "dist/$fname"
          done
          cd dist
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Multifrost Router ${{ steps.version.outputs.version }}
          body: |
            ## Multifrost Router v${{ steps.version.outputs.version }}

            Standalone WebSocket router for Multifrost v5.

            ### Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh -s -- --version ${{ steps.version.outputs.tag }}
            ```

            ### Binaries

            | Platform | Binary |
            |---|---|
            | Linux x86_64 | `multifrost-router-linux-x86_64` |
            | Linux ARM64 | `multifrost-router-linux-aarch64` |
            | macOS x86_64 | `multifrost-router-macos-x86_64` |
            | macOS ARM64 | `multifrost-router-macos-aarch64` |
            | Windows x86_64 | `multifrost-router-windows-x86_64.exe` |

            See [install instructions](https://github.com/${{ github.repository }}#router) for detailed setup.
          files: |
            dist/*
          draft: false
          prerelease: false
